<svg viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="30" text-anchor="middle" font-size="15" font-weight="500" fill="#444441">图片知识库转化工具 - 工作流程</text>

  <!-- Step 1: 放入图片 -->
  <g>
    <rect x="40" y="70" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
    <text x="100" y="98" text-anchor="middle" font-size="14" font-weight="500" fill="#444441" dominant-baseline="central">放入图片</text>
    <text x="100" y="118" text-anchor="middle" font-size="12" fill="#888780" dominant-baseline="central">待处理图片/</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="160" y1="98" x2="200" y2="98" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: OCR识别 -->
  <g>
    <rect x="200" y="70" width="120" height="56" rx="8" fill="#E6F1FB" stroke="#B4B2A9" stroke-width="0.5"/>
    <text x="260" y="98" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C" dominant-baseline="central">OCR识别</text>
    <text x="260" y="118" text-anchor="middle" font-size="12" fill="#888780" dominant-baseline="central">腾讯云/百度</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="320" y1="98" x2="360" y2="98" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: AI分类 -->
  <g>
    <rect x="360" y="70" width="120" height="56" rx="8" fill="#EAF3DE" stroke="#B4B2A9" stroke-width="0.5"/>
    <text x="420" y="98" text-anchor="middle" font-size="14" font-weight="500" fill="#27500A" dominant-baseline="central">AI分类</text>
    <text x="420" y="118" text-anchor="middle" font-size="12" fill="#888780" dominant-baseline="central">混元/Kimi</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="480" y1="98" x2="520" y2="98" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: 生成文档 -->
  <g>
    <rect x="520" y="70" width="120" height="56" rx="8" fill="#FAEEDA" stroke="#B4B2A9" stroke-width="0.5"/>
    <text x="580" y="98" text-anchor="middle" font-size="14" font-weight="500" fill="#854F0B" dominant-baseline="central">生成文档</text>
    <text x="580" y="118" text-anchor="middle" font-size="12" fill="#888780" dominant-baseline="central">Word + Markdown</text>
  </g>

  <!-- Output folder -->
  <g>
    <rect x="520" y="180" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text x="580" y="208" text-anchor="middle" font-size="14" font-weight="500" fill="#444441" dominant-baseline="central">输出结果</text>
    <text x="580" y="228" text-anchor="middle" font-size="12" fill="#888780" dominant-baseline="central">处理结果/</text>
  </g>

  <!-- Arrow down -->
  <line x1="580" y1="126" x2="580" y2="180" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- IMA sync -->
  <g>
    <rect x="360" y="180" width="120" height="56" rx="8" fill="#E1F5EE" stroke="#B4B2A9" stroke-width="0.5"/>
    <text x="420" y="208" text-anchor="middle" font-size="14" font-weight="500" fill="#444441" dominant-baseline="central">IMA同步</text>
    <text x="420" y="228" text-anchor="middle" font-size="12" fill="#888780" dominant-baseline="central">自动上传</text>
  </g>

  <!-- Arrow to IMA -->
  <line x1="520" y1="208" x2="520" y2="208" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Footer text -->
  <text x="340" y="290" text-anchor="middle" font-size="13" fill="#888780">支持分批处理 · 断点续传 · 重复检测</text>
</svg>