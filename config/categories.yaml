# 默认分类配置
fallback:
  # 无法分类时的默认分类ID
  default_category_id: "misc"
  # 无法分类时的默认文档
  default_document: "50_综合知识.md"
  # 最低置信度阈值（低于此值使用默认分类）
  min_confidence: 0.3

# 分类匹配配置
matching:
  # 关键词匹配模式: "all"=全部匹配, "any"=任意匹配
  mode: "any"
  # 是否区分大小写
  case_sensitive: false
  # 是否进行同义词扩展
  enable_synonyms: false
