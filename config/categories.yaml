# 分类配置文件
# 图片知识库转化工具 - 可配置分类系统
# 
# 使用说明：
# - id: 分类唯一标识符（英文，用于代码引用）
# - name: 分类显示名称（中文）
# - keywords: 关键词列表，匹配越多置信度越高
# - priority: 优先级（数字越大优先级越高）
# - document: 归档的目标文档名
# - enabled: 是否启用该分类

